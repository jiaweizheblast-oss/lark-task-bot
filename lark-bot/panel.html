<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Console</title>
<style>
  :root{
    --bg:#f6f7f9;--panel:#fff;--panel2:#fbfbfd;--ink:#1c2024;--soft:#5b636b;--line:#e7e9ec;--lineS:#d7dade;
    --accent:#5b5bd6;--accentS:#eceafc;--ok:#16a34a;--okB:#e8f6ec;--warn:#c2740a;--warnB:#fdf1e3;--danger:#dc2626;--dangerB:#fdecec;
    --p-hi:#dc2626;--p-mid:#c2740a;--p-lo:#16a34a;--shadow:0 1px 2px rgba(20,25,35,.05),0 4px 16px rgba(20,25,35,.06);
    --s-pending:#5b5bd6;--s-accepted:#0d9488;--s-done:#16a34a;--s-issue:#c2740a;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#0e1013;--panel:#171a1f;--panel2:#1c2026;--ink:#e6e8eb;--soft:#9aa2ab;--line:#262b31;--lineS:#333a42;
    --accent:#8b8bf0;--accentS:#23233a;--ok:#4ade80;--okB:#16281c;--warn:#e5a44b;--warnB:#33280f;--danger:#f87171;--dangerB:#38201f;
    --p-hi:#f87171;--p-mid:#e5a44b;--p-lo:#4ade80;--shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.3);
    --s-pending:#8b8bf0;--s-accepted:#2dd4bf;--s-done:#4ade80;--s-issue:#e5a44b;}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:15px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  input,select,textarea,button{font-family:inherit;font-size:14px;color:var(--ink)}
  .hide{display:none!important}
  #login{min-height:100vh;display:grid;place-items:center;padding:20px}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:28px 26px;width:100%;max-width:360px;text-align:center}
  .login-card h1{font-size:20px;margin:0 0 4px} .login-card p{color:var(--soft);font-size:13px;margin:0 0 18px}
  .field{text-align:left;margin-bottom:12px}
  .field label{display:block;font-size:12.5px;color:var(--soft);margin-bottom:5px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--lineS);border-radius:9px;background:var(--panel2);outline:none;transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--panel)}
  .field textarea{resize:vertical;min-height:60px}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:10px 16px;font-weight:650;cursor:pointer;transition:.15s;font-size:14px}
  .btn:hover{filter:brightness(1.06)} .btn:disabled{opacity:.5;cursor:default}
  .btn.wide{width:100%} .btn.ghost{background:transparent;color:var(--soft);border:1px solid var(--line)}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px} .btn.danger{background:var(--danger)}
  .err{color:var(--danger);font-size:12.5px;margin-top:8px;min-height:16px}
  header{position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:11px 18px}
  header .logo{font-weight:750;font-size:16px} header .logo span{color:var(--accent)}
  .tabs{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
  .tabs button{border:0;background:transparent;color:var(--soft);font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer}
  .tabs button.on{background:var(--accent);color:#fff}
  header .sp{flex:1}
  .wrap{max-width:1200px;margin:0 auto;padding:18px}
  .form-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:22px 24px;max-width:640px;margin:0 auto}
  .form-card h2{margin:0 0 4px;font-size:17px} .form-card .sub{color:var(--soft);font-size:13px;margin:0 0 18px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px} @media(max-width:560px){.row2{grid-template-columns:1fr}}
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px} @media(max-width:760px){.stats{grid-template-columns:repeat(3,1fr)}}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;box-shadow:var(--shadow)}
  .stat .n{font-size:22px;font-weight:750;font-variant-numeric:tabular-nums} .stat .l{font-size:11.5px;color:var(--soft);margin-top:1px}
  .stat.over .n{color:var(--danger)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar select,.toolbar input{padding:7px 10px;border:1px solid var(--lineS);border-radius:9px;background:var(--panel);outline:none;font-size:13px}
  .toolbar input.search{flex:1;min-width:150px} .toolbar .sp{flex:1}
  .board{display:grid;grid-template-columns:repeat(5,1fr);gap:12px} @media(max-width:1200px){.board{grid-template-columns:repeat(3,1fr)}} @media(max-width:820px){.board{grid-template-columns:repeat(2,1fr)}} @media(max-width:540px){.board{grid-template-columns:1fr}}
  .col{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:10px;min-height:120px}
  .col h3{margin:2px 4px 10px;font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:7px}
  .col h3 .dot{width:9px;height:9px;border-radius:50%} .col h3 .cnt{margin-left:auto;color:var(--soft);font-weight:600;font-size:12px;background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:1px 8px}
  .tcard{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer;transition:.12s}
  .tcard:hover{border-color:var(--accent)} .tcard.over{border-left:3px solid var(--danger)}
  .unread{position:absolute;top:8px;right:8px;width:11px;height:11px;border-radius:50%;background:var(--danger);box-shadow:0 0 0 2px var(--panel),0 0 0 4px rgba(220,38,38,.25)}
  .tcard.unreadcard{border-color:var(--danger)}
  .tcard .tt{font-weight:650;font-size:13.5px;margin-bottom:6px}
  .tcard .meta{font-size:12px;color:var(--soft);display:flex;flex-wrap:wrap;gap:8px;align-items:center} .tcard .who{color:var(--ink);font-weight:600}
  .pri{font-size:11px;font-weight:750;border-radius:5px;padding:1px 6px}
  .pri.High{color:#fff;background:var(--p-hi)} .pri.Medium{color:#fff;background:var(--p-mid)} .pri.Low{color:#fff;background:var(--p-lo)}
  .tcard .grp{font-size:11px;color:var(--soft)} .badge-ext{font-size:10px;background:var(--accentS);color:var(--accent);border-radius:5px;padding:1px 5px;font-weight:700}
  .tcard .rsn{font-size:12px;color:var(--warn);background:var(--warnB);border-radius:7px;padding:5px 8px;margin-top:6px}
  .muted{color:var(--soft);font-size:13px;text-align:center;padding:20px}
  .cal-head{display:flex;align-items:center;gap:12px;margin-bottom:12px} .cal-head h2{margin:0;font-size:17px;min-width:150px}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal .dow{font-size:12px;color:var(--soft);text-align:center;font-weight:600;padding:2px}
  .cal .cell{background:var(--panel);border:1px solid var(--line);border-radius:10px;min-height:92px;padding:6px}
  .cal .cell.out{background:var(--panel2);opacity:.5} .cal .cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .cal .cell .d{font-size:12px;color:var(--soft);font-weight:600;margin-bottom:4px}
  .cal .chip{font-size:11px;border-radius:5px;padding:2px 5px;margin-bottom:3px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .modal-bg{position:fixed;inset:0;background:rgba(10,12,16,.5);display:grid;place-items:center;z-index:40;padding:16px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:460px;padding:20px 22px;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 3px;font-size:16px} .modal .mid{font-size:12px;color:var(--soft);margin-bottom:14px}
  .modal .info{font-size:13px;color:var(--soft);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:14px;white-space:pre-wrap}
  .modal .acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;align-items:center}
  .stbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .stbtns button{border:1px solid var(--line);background:var(--panel2);color:var(--soft);border-radius:8px;padding:5px 10px;font-size:12.5px;cursor:pointer}
  .stbtns button.on{color:#fff;border-color:transparent}
  .eg-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .eg-item .egn{flex:1;font-weight:600}
  .tip{font-size:12px;color:var(--soft);background:var(--accentS);border-radius:9px;padding:9px 11px;margin:8px 0 12px;line-height:1.55}
  .thread{display:flex;flex-direction:column;gap:7px;max-height:230px;overflow:auto;padding:4px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .cmt{border-radius:9px;padding:7px 10px;font-size:12.5px;max-width:86%;line-height:1.5}
  .cmt .cw{font-size:10.5px;color:var(--soft);margin-bottom:2px}
  .cmt.pub{background:var(--accentS);align-self:flex-end;border:1px solid var(--line)}
  .cmt.asg{background:var(--okB);align-self:flex-start;border:1px solid var(--line)}
  .cmt.sys{align-self:center;background:transparent;color:var(--soft);font-size:11.5px;text-align:center;max-width:100%}
  .replybar{display:flex;gap:6px;margin-bottom:14px}
  .replybar input{flex:1;padding:8px 10px;border:1px solid var(--lineS);border-radius:8px;background:var(--panel);outline:none;font-size:13px}
  .rtable{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);font-size:13px}
  .rtable th,.rtable td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
  .rtable th{background:var(--panel2);color:var(--soft);font-size:12px;font-weight:600;white-space:nowrap}
  .rtable td{font-variant-numeric:tabular-nums} .rtable tr:last-child td{border-bottom:0}
  .rtable td.name{font-weight:650} .rate{font-weight:700;border-radius:5px;padding:1px 7px;font-size:12px}
  .rate.good{color:var(--ok);background:var(--okB)} .rate.mid{color:var(--warn);background:var(--warnB)} .rate.bad{color:var(--danger);background:var(--dangerB)}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:600;transition:.25s;pointer-events:none;z-index:60;box-shadow:var(--shadow)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)} #toast.err{background:var(--danger);color:#fff}
</style>
</head>
<body>
<div id="login">
  <div class="login-card">
    <h1>🤖 Task Console</h1><p>Enter your password to continue.</p>
    <div class="field"><label>Password</label><input id="pw" type="password" placeholder="Console password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn wide" onclick="doLogin()">Log in</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="app" class="hide">
  <header>
    <div class="logo">🤖 Task <span>Console</span></div>
    <div class="tabs">
      <button id="tab-create" class="on" onclick="showTab('create')">New Task</button>
      <button id="tab-board" onclick="showTab('board')">Board</button>
      <button id="tab-cal" onclick="showTab('cal')">Calendar</button>
      <button id="tab-report" onclick="showTab('report')">Reports</button>
      <button id="tab-recruit" onclick="showTab('recruit')">Recruiting</button>
    </div>
    <div class="sp"></div>
    <button class="btn ghost sm" onclick="openReminderSettings()">🔔 Reminders</button>
    <button class="btn ghost sm" onclick="openExtSettings()">⚙️ External Groups</button>
    <button class="btn ghost sm" onclick="logout()">Log out</button>
  </header>
  <div class="wrap">
    <section id="view-create">
      <div class="form-card">
        <h2>Assign a task</h2>
        <p class="sub">Pick a group → pick an assignee → add the details → assign. Internal groups use the bot; external groups use a webhook.</p>
        <div class="row2">
          <div class="field"><label>Group *</label><select id="fGroup" onchange="onGroup()"><option value="">Loading…</option></select></div>
          <div class="field"><label>Assignee *</label>
            <select id="fAssignee"><option value="">Pick a group first</option></select>
            <input id="fAssigneeName" class="hide" placeholder="Assignee name (type it for external groups)"></div>
        </div>
        <div class="field"><label>Title *</label><input id="fTitle" placeholder="One line: what needs to be done"></div>
        <div class="field"><label>Details</label><textarea id="fDetail" placeholder="How to do it, the steps, deliverables"></textarea></div>
        <div class="field"><label>Notes</label><textarea id="fNote" placeholder="Things to watch, acceptance criteria"></textarea></div>
        <div class="row2">
          <div class="field"><label>Priority</label><select id="fPriority"><option>Medium</option><option>High</option><option>Low</option></select></div>
          <div class="field"><label>Due date</label><input id="fDeadline" type="date"></div>
        </div>
        <button class="btn wide" id="submitBtn" onclick="submitTask()">🚀 Assign Task</button>
        <div class="err" id="createErr"></div>
      </div>
    </section>
    <section id="view-board" class="hide">
      <div class="stats" id="stats"></div>
      <div class="toolbar">
        <select id="flGroup" onchange="renderBoard()"><option value="">All groups</option></select>
        <select id="flAssignee" onchange="renderBoard()"><option value="">All assignees</option></select>
        <select id="flStatus" onchange="renderBoard()"><option value="">All statuses</option><option value="pending">To Do</option><option value="accepted">In Progress</option><option value="done">Completed</option><option value="overdue">Overdue</option><option value="comm">Needs Reply</option></select>
        <input class="search" id="flSearch" placeholder="🔍 Search tasks…" oninput="renderBoard()">
        <div class="sp"></div>
        <button class="btn ghost sm" onclick="exportCSV()">⬇ Export</button>
        <button class="btn ghost sm" onclick="loadTasks()">🔄 Refresh</button>
      </div>
      <div class="board" id="board"></div>
    </section>
    <section id="view-cal" class="hide">
      <div class="cal-head">
        <button class="btn ghost sm" onclick="calMove(-1)">←</button><h2 id="calTitle"></h2>
        <button class="btn ghost sm" onclick="calMove(1)">→</button><button class="btn ghost sm" onclick="calMove(0)">Today</button>
        <div class="sp"></div><button class="btn ghost sm" onclick="calSubscribe()">📅 Subscribe to my calendar</button>
      </div>
      <div class="cal" id="cal"></div>
    </section>
    <section id="view-report" class="hide">
      <div class="toolbar">
        <div style="font-weight:750;font-size:16px">📊 Team Report</div>
        <div class="sp"></div>
        <button class="btn ghost sm" onclick="calSubscribe()">📅 Calendar feed</button>
        <button class="btn ghost sm" onclick="exportReport()">⬇ Export weekly report (CSV)</button>
      </div>
      <div class="stats" id="reportTiles"></div>
      <div id="reportBody"></div>
    </section>
    <section id="view-recruit" class="hide">
      <div class="form-card" style="max-width:860px">
        <h2 id="cFormTitle">招聘渠道 · 每日录入</h2>
        <p class="sub">HR 每天每个渠道填一行；多个 HR 各填各的，系统按「日期+渠道+职位」自动汇总，跟谁先填后填无关。</p>
        <div class="row2">
          <div class="field"><label>日期</label><input id="cDate" type="date"></div>
          <div class="field"><label>填写人（你的名字）*</label><input id="cBy" placeholder="多 HR 靠这个区分"></div>
        </div>
        <div class="row2">
          <div class="field"><label>招聘渠道 *</label><select id="cChannel"></select></div>
          <div class="field"><label>关联职位 *</label><select id="cJob"></select></div>
        </div>
        <div class="row2">
          <div class="field"><label>今日新增简历数</label><input id="cNew" type="number" min="0" value="0"></div>
          <div class="field"><label>初筛通过数</label><input id="cPassed" type="number" min="0" value="0"></div>
        </div>
        <div class="row2">
          <div class="field"><label>已推荐面试数</label><input id="cRec" type="number" min="0" value="0"></div>
          <div class="field"><label>已拒绝数</label><input id="cRej" type="number" min="0" value="0"></div>
        </div>
        <div class="field"><label>备注</label><input id="cNote" placeholder="如：渠道质量差／简历重复多"></div>
        <button class="btn wide" id="cSubmit" onclick="submitChannel()">提交</button>
        <button class="btn ghost sm" id="cCancel" onclick="cancelChannelEdit()" style="display:none;margin-top:8px">取消编辑</button>
        <div class="err" id="cErr"></div>
      </div>
      <div class="toolbar" style="margin-top:18px">
        <div style="font-weight:750;font-size:16px">📅 当日记录</div>
        <input id="cViewDate" type="date" onchange="loadChannelRecords()">
        <div class="sp"></div>
        <select id="cPushGroup"></select>
        <button class="btn ghost sm" onclick="genChannelReport()">📊 生成日报</button>
        <button class="btn ghost sm" onclick="pushChannelReport()">📤 推送到群</button>
      </div>
      <div id="cRecords"></div>
      <div id="cReportCard" class="hide" style="margin-top:16px">
        <pre id="cReportText" style="background:#0f172a;color:#e2e8f0;padding:16px;border-radius:10px;white-space:pre-wrap;font-family:inherit;line-height:1.65;margin:0 0 12px"></pre>
        <div id="cBreakdown"></div>
        <ul id="cAlerts" style="list-style:none;padding:0;margin:12px 0 0"></ul>
      </div>
    </section>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script>
let PW="", TASKS=[], GROUPS=[], GMAP={}, EGROUPS=[], EGMAP={}, MEMCACHE={}, calY=0, calM=0, TZLABEL="", TZOFF=null, WORKEND=22, WORKSTART=10;
const dlText=d=>d?(d+(TZLABEL?(' '+TZLABEL):'')):'';
function localOf(d){if(!d||TZOFF==null)return'';const p=d.split('-').map(Number);const inst=Date.UTC(p[0],p[1]-1,p[2],WORKEND,0,0)-TZOFF*3600000;const vo=-new Date().getTimezoneOffset()/60;if(vo===TZOFF)return'';return 'your local ~'+new Date(inst).toLocaleString([],{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
// 真实状态只有三个（手动设置、统计都用它）
const STATUS=[{k:"pending",n:"To Do",c:"var(--s-pending)"},{k:"accepted",n:"In Progress",c:"var(--s-accepted)"},{k:"done",n:"Completed",c:"var(--s-done)"}];
// 看板列 = 三个状态 + 已到期(超期) + 待沟通(有未读留言)，待沟通排最后
const BOARDCOLS=STATUS.concat([{k:"overdue",n:"🔴 Overdue",c:"var(--danger)"},{k:"comm",n:"💬 Needs Reply",c:"var(--s-issue)"}]);
// 一个任务归到哪一列：有未读留言→待沟通；否则超期→已到期；否则按真实状态
function taskCol(t){return t.unread?'comm':(overdue(t)?'overdue':t.status);}
const SC={pending:"var(--s-pending)",accepted:"var(--s-accepted)",done:"var(--s-done)",issue:"var(--s-issue)"};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const val=id=>document.getElementById(id).value.trim();
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='show'+(e?' err':'');setTimeout(()=>t.className='',2400);}
async function api(path,opts={}){opts.headers=Object.assign({'X-Auth':PW,'Content-Type':'application/json'},opts.headers||{});const r=await fetch(path,opts);if(r.status===401){logout();throw new Error('401');}return r;}

async function doLogin(){const pw=document.getElementById('pw').value;document.getElementById('loginErr').textContent='';
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    if(!r.ok){document.getElementById('loginErr').textContent='Incorrect password, or the console password is not set yet.';return;}
    PW=pw;sessionStorage.setItem('pw',pw);enterApp();}catch(e){document.getElementById('loginErr').textContent='Connection failed';}}
function logout(){PW='';sessionStorage.removeItem('pw');document.getElementById('app').classList.add('hide');document.getElementById('login').classList.remove('hide');}
async function enterApp(){document.getElementById('login').classList.add('hide');document.getElementById('app').classList.remove('hide');
  const d=new Date();calY=d.getFullYear();calM=d.getMonth();await loadConfig();await loadExternalGroups();await loadGroups();loadTasks();}
async function loadConfig(){try{const c=await(await api('/api/config')).json();TZLABEL=c.tz_label||'';TZOFF=(c.tz_offset==null?null:c.tz_offset);WORKEND=c.work_end||22;WORKSTART=c.work_start||10;}catch(e){TZLABEL='';TZOFF=null;}}

function groupKey(t){return t.is_external?('ext:'+t.external_group_id):t.group_chat_id;}
function groupName(t){return t.is_external?(EGMAP[t.external_group_id]||'External group'):(GMAP[t.group_chat_id]?.name||'');}
function overdue(t){return t.deadline&&(t.status==='pending'||t.status==='accepted')&&t.deadline<todayStr();}
function renderStats(){const c=k=>TASKS.filter(t=>taskCol(t)===k).length;
  const tiles=[['Total',TASKS.length,''],['To Do',c('pending'),''],['In Progress',c('accepted'),''],['Completed',c('done'),''],['Overdue',c('overdue'),'over'],['Needs Reply',c('comm'),'']];
  document.getElementById('stats').innerHTML=tiles.map(([l,n,c])=>`<div class="stat ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');}
function filtered(){const g=document.getElementById('flGroup').value,a=document.getElementById('flAssignee').value,s=document.getElementById('flStatus').value,q=document.getElementById('flSearch').value.trim().toLowerCase();

function sortInCol(a,b){const da=a.deadline||'9999-99-99',db2=b.deadline||'9999-99-99';return da<db2?-1:(da>db2?1:0);}  // 截止早的在前
function colItems(list,k){return list.filter(t=>taskCol(t)===k);}  // 按 taskCol 归列，每条只进一列
function renderBoard(){const list=filtered();document.getElementById('board').innerHTML=BOARDCOLS.map(s=>{const items=colItems(list,s.k).sort(sortInCol);
  return `<div class="col"><h3><span class="dot" style="background:${s.c}"></span>${s.n}<span class="cnt">${items.length}</span></h3><div>${items.map(tcard).join('')||'<div class="muted">None</div>'}</div></div>`;}).join('');}
function tcard(t){const pri=t.priority?`<span class="pri ${t.priority}">${t.priority}</span>`:'';const who=t.assignee_name?`<span class="who">👤 ${esc(t.assignee_name)}</span>`:'';
  const dl=t.deadline?`<span>📅 ${dlText(t.deadline)}${overdue(t)?' ⚠️':''}</span>`:'';const gn=groupName(t);

    <div class="field"><label>Priority</label><select id="mPriority">${['High','Medium','Low'].map(p=>`<option ${p===t.priority?'selected':''}>${p}</option>`).join('')}</select></div></div>
    ${reassign}

    <button class="btn ghost sm" onclick="closeModal()">Close</button></div>
  </div></div>`;loadComments(id);}

function copyLink(){const el=document.getElementById('mLink');if(!el)return;el.select();try{navigator.clipboard.writeText(el.value);}catch(e){try{document.execCommand('copy');}catch(_){}}toast('✅ Link copied — send it to the assignee');}
function fmtTime(s){if(!s)return'';const d=new Date(s);if(isNaN(d))return esc(s);return (d.getMonth()+1)+'-'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
const SIDE_CLS={publisher:'pub',assignee:'asg',system:'sys'},SIDE_NM={publisher:'Sender',assignee:'Assignee',system:''};

function renderCalendar(){const cal=document.getElementById('cal');if(!cal)return;document.getElementById('calTitle').textContent=['January','February','March','April','May','June','July','August','September','October','November','December'][calM]+' '+calY;

function daysBetween(a,b){const x=new Date(a),y=new Date(b);if(isNaN(x)||isNaN(y))return null;return Math.max(0,Math.round((y-x)/86400000));}
function reportRows(){const byP={};TASKS.forEach(t=>{const n=t.assignee_name||'(Unassigned)';(byP[n]=byP[n]||[]).push(t);});
  return Object.entries(byP).map(([name,ts])=>{const done=ts.filter(t=>t.status==='done');
    const onTime=done.filter(t=>!t.deadline||(t.updated_at&&t.updated_at.slice(0,10)<=t.deadline)).length;
    const rate=done.length?Math.round(onTime/done.length*100):null;
    const durs=done.map(t=>daysBetween(t.created_at,t.updated_at)).filter(x=>x!=null);
    const avg=durs.length?(durs.reduce((a,b)=>a+b,0)/durs.length):null;
    return {name,total:ts.length,done:done.length,onTime,rate,overdueN:ts.filter(overdue).length,avg};}).sort((a,b)=>b.total-a.total);}
function rateCls(r){return r==null?'':(r>=90?'good':(r>=70?'mid':'bad'));}
function renderReport(){const body=document.getElementById('reportBody');if(!body)return;
  const tot=TASKS.length,done=TASKS.filter(t=>t.status==='done').length,over=TASKS.filter(overdue).length;
  const allOn=TASKS.filter(t=>t.status==='done'&&(!t.deadline||(t.updated_at&&t.updated_at.slice(0,10)<=t.deadline))).length;
  const orate=done?Math.round(allOn/done*100)+'%':'—';
  document.getElementById('reportTiles').innerHTML=[['Total',tot,''],['Completed',done,''],['On-time',orate,''],['Overdue',over,'over']].map(([l,n,c])=>`<div class="stat ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
  const rows=reportRows();
  body.innerHTML=rows.length?`<table class="rtable"><thead><tr><th>Assignee</th><th>Total</th><th>Completed</th><th>On time</th><th>On-time %</th><th>Overdue</th><th>Avg days</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="name">${esc(r.name)}</td><td>${r.total}</td><td>${r.done}</td><td>${r.onTime}</td><td>${r.rate==null?'—':`<span class="rate ${rateCls(r.rate)}">${r.rate}%</span>`}</td><td>${r.overdueN}</td><td>${r.avg==null?'—':r.avg.toFixed(1)}</td></tr>`).join('')}</tbody></table>`:'<div class="muted">No task data yet</div>';}
function exportReport(){const rows=reportRows();const head=['Assignee','Total','Completed','On time','On-time %','Overdue','Avg days'];
  const data=rows.map(r=>[r.name,r.total,r.done,r.onTime,r.rate==null?'':r.rate+'%',r.overdueN,r.avg==null?'':r.avg.toFixed(1)]);
  const csv='﻿'+[head,...data].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='team-report.csv';a.click();}

    <div class="field" style="margin-top:10px"><label>Skip holidays (one date per line, e.g. 2026-08-15)</label><textarea id="rs_holidays" placeholder="2026-08-15&#10;2026-10-02" style="min-height:60px">${esc(hol)}</textarea></div>
    <button class="btn wide" onclick="saveReminderSettings()">Save</button><div class="err" id="rsErr"></div>
    <div class="acts" style="margin-top:10px"><div style="flex:1"></div><button class="btn ghost sm" onclick="closeModal()">Close</button></div>
  </div></div>`;}
async function saveReminderSettings(){const g=k=>document.getElementById('rs_'+k).checked;
  const body={enabled:g('enabled'),tier_before:g('tier_before'),tier_today:g('tier_today'),tier_over:g('tier_over'),skip_weekends:g('skip_weekends'),holidays:document.getElementById('rs_holidays').value};
  try{await api('/api/settings',{method:'POST',body:JSON.stringify(body)});toast('✅ Reminder settings saved');closeModal();}catch(e){document.getElementById('rsErr').textContent='Save failed, please try again';}}

// ---- 外部群设置 ----
async function openExtSettings(){
  const list=EGROUPS.map(g=>`<div class="eg-item"><span class="egn">🌐 ${esc(g.name)}</span><button class="btn danger sm" onclick="delExtGroup(${g.id})">Remove</button></div>`).join('')||'<div class="muted">No external groups yet</div>';
  document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>⚙️ External Groups</h3><div class="mid">External groups can't add the app bot — they use a webhook instead.</div>
    <div class="tip">How to get a webhook: in the external group → Settings → Add Bot → choose <b>Custom Bot</b> → copy its <b>Webhook URL</b> and paste it below.</div>
    <div id="egList">${list}</div>
    <div style="margin-top:14px"><div class="field"><label>External group name (your own label)</label><input id="egName" placeholder="e.g. Supplier 21win group"></div>
    <div class="field"><label>Webhook URL</label><input id="egUrl" placeholder="https://open.larksuite.com/open-apis/bot/v2/hook/..."></div>
    <button class="btn wide" onclick="addExtGroup()">＋ Add external group</button><div class="err" id="egErr"></div></div>
    <div class="acts" style="margin-top:12px"><div style="flex:1"></div><button class="btn ghost sm" onclick="closeModal()">Close</button></div>
  </div></div>`;}
async function addExtGroup(){const name=val('egName'),url=val('egUrl'),err=document.getElementById('egErr');err.textContent='';
  if(!name||!url){err.textContent='Both a name and a webhook URL are required';return;}
  try{const j=await(await api('/api/external-groups',{method:'POST',body:JSON.stringify({name,webhook_url:url})})).json();
    if(j.ok){await loadExternalGroups();await loadGroups();openExtSettings();toast('✅ External group added');}else err.textContent=j.error||'Failed to add';
  }catch(e){err.textContent='Failed to add';}}
async function delExtGroup(id){if(!confirm('Remove this external group?'))return;try{await api('/api/external-groups/'+id,{method:'DELETE'});await loadExternalGroups();await loadGroups();openExtSettings();toast('Removed');}catch(e){toast('Remove failed',true);}}

// ---- 招聘渠道日报模块 ----
let CMETA={channels:[],jobs:[],today:''}, cEditId=null, CRECS=[];
const cpct=x=>x==null?'—':Math.round(x*100)+'%';
const cwow=x=>{if(x==null)return '<span class="muted">—</span>';const s=(x>=0?'+':'')+Math.round(x*100)+'%';return `<span style="color:${x<0?'var(--danger)':'var(--ok)'};font-weight:600">${s}</span>`;};
async function loadChannelTab(){
  try{CMETA=await(await api('/api/channel/meta')).json();}catch(e){CMETA={channels:[],jobs:[],today:todayStr()};}
  document.getElementById('cChannel').innerHTML=(CMETA.channels||[]).map(c=>`<option>${esc(c)}</option>`).join('');
  document.getElementById('cJob').innerHTML=(CMETA.jobs||[]).map(j=>`<option value="${j.id}">${esc(j.title)}（目标 ${j.target_headcount} 人）</option>`).join('')||'<option value="">（后端暂无职位）</option>';
  if(!document.getElementById('cDate').value)document.getElementById('cDate').value=CMETA.today;
  if(!document.getElementById('cViewDate').value)document.getElementById('cViewDate').value=CMETA.today;
  const pg=document.getElementById('cPushGroup');
  pg.innerHTML='<option value="">推送到…（选群）</option>'+(GROUPS||[]).map(g=>`<option value="${g.chat_id}">${esc(g.name)}</option>`).join('')+(EGROUPS||[]).map(g=>`<option value="ext:${g.id}">${esc(g.name)} (external)</option>`).join('');
  loadChannelRecords();
}
async function loadChannelRecords(){
  const d=document.getElementById('cViewDate').value||CMETA.today;
  try{CRECS=await(await api('/api/channel/records?d='+d)).json();}catch(e){CRECS=[];}
  if(!Array.isArray(CRECS))CRECS=[];
  const box=document.getElementById('cRecords');
  if(!CRECS.length){box.innerHTML='<div class="muted">该日暂无记录。上面录入，或点右上「生成日报」看汇总。</div>';return;}
  box.innerHTML=`<table class="rtable"><thead><tr><th>渠道</th><th>职位</th><th>填写人</th><th>新增</th><th>初筛</th><th>推荐</th><th>拒绝</th><th>备注</th><th></th></tr></thead><tbody>${CRECS.map(r=>`<tr><td class="name">${esc(r.channel)}</td><td>${esc(r.job_title||r.job_request_id)}</td><td>${esc(r.filled_by)}</td><td>${r.new_resumes}</td><td>${r.passed_screening}</td><td>${r.recommended}</td><td>${r.rejected}</td><td>${esc(r.note||'')}</td><td style="white-space:nowrap"><span onclick="editChannelRecord(${r.id})" style="color:var(--accent);cursor:pointer">编辑</span> · <span onclick="delChannelRecord(${r.id})" style="color:var(--danger);cursor:pointer">删除</span></td></tr>`).join('')}</tbody></table>`;
}
function cPayload(){return {record_date:document.getElementById('cDate').value,channel:document.getElementById('cChannel').value,job_request_id:parseInt(document.getElementById('cJob').value||'0',10),filled_by:val('cBy'),new_resumes:parseInt(document.getElementById('cNew').value||'0',10),passed_screening:parseInt(document.getElementById('cPassed').value||'0',10),recommended:parseInt(document.getElementById('cRec').value||'0',10),rejected:parseInt(document.getElementById('cRej').value||'0',10),note:val('cNote')};}
async function submitChannel(){
  const err=document.getElementById('cErr');err.textContent='';
  const body=cPayload();
  const url=cEditId?('/api/channel/records/'+cEditId):'/api/channel/records';
  const method=cEditId?'PATCH':'POST';
  let r,j;try{r=await api(url,{method,body:JSON.stringify(body)});j=await r.json().catch(()=>({}));}catch(e){err.textContent='提交失败';return;}
  if(!r.ok){err.textContent='提交失败：'+((j.errors&&j.errors.join('；'))||j.error||'');return;}
  const w=j.warnings||[];toast(w.length?('已保存，请复核：'+w.join('；')):'已保存 ✓');
  cancelChannelEdit(true);
  document.getElementById('cViewDate').value=body.record_date;
  loadChannelRecords();
}
function editChannelRecord(id){const r=CRECS.find(x=>x.id===id);if(!r)return;cEditId=r.id;document.getElementById('cDate').value=(r.record_date||'').slice(0,10);document.getElementById('cBy').value=r.filled_by||'';document.getElementById('cChannel').value=r.channel;document.getElementById('cJob').value=r.job_request_id;document.getElementById('cNew').value=r.new_resumes;document.getElementById('cPassed').value=r.passed_screening;document.getElementById('cRec').value=r.recommended;document.getElementById('cRej').value=r.rejected;document.getElementById('cNote').value=r.note||'';document.getElementById('cFormTitle').textContent='编辑记录';document.getElementById('cSubmit').textContent='保存修改';document.getElementById('cCancel').style.display='inline-block';window.scrollTo({top:0,behavior:'smooth'});}
function cancelChannelEdit(keep){cEditId=null;['cNew','cPassed','cRec','cRej'].forEach(id=>document.getElementById(id).value='0');document.getElementById('cNote').value='';document.getElementById('cFormTitle').textContent='招聘渠道 · 每日录入';document.getElementById('cSubmit').textContent='提交';document.getElementById('cCancel').style.display='none';if(!keep)document.getElementById('cErr').textContent='';}
async function delChannelRecord(id){if(!confirm('删除这条渠道记录？'))return;try{await api('/api/channel/records/'+id,{method:'DELETE'});loadChannelRecords();}catch(e){toast('删除失败',true);}}
async function genChannelReport(){
  const d=document.getElementById('cViewDate').value||CMETA.today;
  let rep;try{rep=await(await api('/api/channel/report?d='+d)).json();}catch(e){toast('生成失败',true);return;}
  document.getElementById('cReportCard').classList.remove('hide');
  document.getElementById('cReportText').textContent=rep.text;
  document.getElementById('cBreakdown').innerHTML=`<table class="rtable"><thead><tr><th>渠道</th><th>今日新增</th><th>环比</th><th>近7日转化率</th><th>近7日推荐率</th><th>连续0天</th></tr></thead><tbody>${(rep.breakdown||[]).map(b=>`<tr><td class="name">${esc(b.channel)}</td><td>${b.day.new}</td><td>${cwow(b.wow_new)}</td><td>${cpct(b.roll7_conversion)}</td><td>${cpct(b.roll7_recommend_rate)}</td><td>${b.zero_streak>0?('<span style="color:var(--danger)">'+b.zero_streak+'</span>'):0}</td></tr>`).join('')}</tbody></table>`;
  document.getElementById('cAlerts').innerHTML=(rep.alerts||[]).map(a=>`<li style="background:var(--warnB);color:var(--warn);padding:8px 12px;border-radius:8px;margin-bottom:8px">⚠️ ${esc(a)}</li>`).join('');
}
async function pushChannelReport(){
  const d=document.getElementById('cViewDate').value||CMETA.today;
  const g=document.getElementById('cPushGroup').value;
  if(!g){toast('先选一个推送目标群',true);return;}
  const body={d};if(g.indexOf('ext:')===0)body.external_group_id=parseInt(g.slice(4),10);else body.chat_id=g;
  try{const j=await(await api('/api/channel/report/push',{method:'POST',body:JSON.stringify(body)})).json();toast(j.pushed?'✅ 已推送到群':'⚠️ 已生成，但推送失败（检查群/webhook）',!j.pushed);}catch(e){toast('推送失败',true);}
}

// 每 20 秒自动刷新看板（让负责人的新留言红点及时出现），弹窗打开时不打扰
setInterval(()=>{const app=document.getElementById('app');const modalOpen=document.getElementById('modalRoot').innerHTML.trim();
  if(PW&&app&&!app.classList.contains('hide')&&!modalOpen)loadTasks();},20000);

const saved=sessionStorage.getItem('pw');if(saved){PW=saved;enterApp();}
</script>
</body>
