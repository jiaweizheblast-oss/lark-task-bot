<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务控制台</title>
<style>
  :root{
    --bg:#f6f7f9;--panel:#fff;--panel2:#fbfbfd;--ink:#1c2024;--soft:#5b636b;--line:#e7e9ec;--lineS:#d7dade;
    --accent:#5b5bd6;--accentS:#eceafc;--ok:#16a34a;--okB:#e8f6ec;--warn:#c2740a;--warnB:#fdf1e3;--danger:#dc2626;--dangerB:#fdecec;
    --p-hi:#dc2626;--p-mid:#c2740a;--p-lo:#16a34a;--shadow:0 1px 2px rgba(20,25,35,.05),0 4px 16px rgba(20,25,35,.06);
    --s-pending:#5b5bd6;--s-accepted:#0d9488;--s-done:#16a34a;--s-issue:#c2740a;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#0e1013;--panel:#171a1f;--panel2:#1c2026;--ink:#e6e8eb;--soft:#9aa2ab;--line:#262b31;--lineS:#333a42;
    --accent:#8b8bf0;--accentS:#23233a;--ok:#4ade80;--okB:#16281c;--warn:#e5a44b;--warnB:#33280f;--danger:#f87171;--dangerB:#38201f;
    --p-hi:#f87171;--p-mid:#e5a44b;--p-lo:#4ade80;--shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.3);
    --s-pending:#8b8bf0;--s-accepted:#2dd4bf;--s-done:#4ade80;--s-issue:#e5a44b;}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:15px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  input,select,textarea,button{font-family:inherit;font-size:14px;color:var(--ink)}
  .hide{display:none!important}
  #login{min-height:100vh;display:grid;place-items:center;padding:20px}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:28px 26px;width:100%;max-width:360px;text-align:center}
  .login-card h1{font-size:20px;margin:0 0 4px} .login-card p{color:var(--soft);font-size:13px;margin:0 0 18px}
  .field{text-align:left;margin-bottom:12px}
  .field label{display:block;font-size:12.5px;color:var(--soft);margin-bottom:5px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--lineS);border-radius:9px;background:var(--panel2);outline:none;transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--panel)}
  .field textarea{resize:vertical;min-height:60px}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:10px 16px;font-weight:650;cursor:pointer;transition:.15s;font-size:14px}
  .btn:hover{filter:brightness(1.06)} .btn:disabled{opacity:.5;cursor:default}
  .btn.wide{width:100%} .btn.ghost{background:transparent;color:var(--soft);border:1px solid var(--line)}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px} .btn.danger{background:var(--danger)}
  .err{color:var(--danger);font-size:12.5px;margin-top:8px;min-height:16px}
  header{position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:11px 18px}
  header .logo{font-weight:750;font-size:16px} header .logo span{color:var(--accent)}
  .tabs{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
  .tabs button{border:0;background:transparent;color:var(--soft);font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer}
  .tabs button.on{background:var(--accent);color:#fff}
  header .sp{flex:1}
  .wrap{max-width:1200px;margin:0 auto;padding:18px}
  .form-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:22px 24px;max-width:640px;margin:0 auto}
  .form-card h2{margin:0 0 4px;font-size:17px} .form-card .sub{color:var(--soft);font-size:13px;margin:0 0 18px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px} @media(max-width:560px){.row2{grid-template-columns:1fr}}
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px} @media(max-width:760px){.stats{grid-template-columns:repeat(3,1fr)}}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;box-shadow:var(--shadow)}
  .stat .n{font-size:22px;font-weight:750;font-variant-numeric:tabular-nums} .stat .l{font-size:11.5px;color:var(--soft);margin-top:1px}
  .stat.over .n{color:var(--danger)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar select,.toolbar input{padding:7px 10px;border:1px solid var(--lineS);border-radius:9px;background:var(--panel);outline:none;font-size:13px}
  .toolbar input.search{flex:1;min-width:150px} .toolbar .sp{flex:1}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px} @media(max-width:900px){.board{grid-template-columns:repeat(2,1fr)}} @media(max-width:560px){.board{grid-template-columns:1fr}}
  .col{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:10px;min-height:120px}
  .col h3{margin:2px 4px 10px;font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:7px}
  .col h3 .dot{width:9px;height:9px;border-radius:50%} .col h3 .cnt{margin-left:auto;color:var(--soft);font-weight:600;font-size:12px;background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:1px 8px}
  .tcard{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer;transition:.12s}
  .tcard:hover{border-color:var(--accent)} .tcard.over{border-left:3px solid var(--danger)}
  .unread{position:absolute;top:8px;right:8px;width:11px;height:11px;border-radius:50%;background:var(--danger);box-shadow:0 0 0 2px var(--panel),0 0 0 4px rgba(220,38,38,.25)}
  .tcard.unreadcard{border-color:var(--danger)}
  .tcard .tt{font-weight:650;font-size:13.5px;margin-bottom:6px}
  .tcard .meta{font-size:12px;color:var(--soft);display:flex;flex-wrap:wrap;gap:8px;align-items:center} .tcard .who{color:var(--ink);font-weight:600}
  .pri{font-size:11px;font-weight:750;border-radius:5px;padding:1px 6px}
  .pri.高{color:#fff;background:var(--p-hi)} .pri.中{color:#fff;background:var(--p-mid)} .pri.低{color:#fff;background:var(--p-lo)}
  .tcard .grp{font-size:11px;color:var(--soft)} .badge-ext{font-size:10px;background:var(--accentS);color:var(--accent);border-radius:5px;padding:1px 5px;font-weight:700}
  .tcard .rsn{font-size:12px;color:var(--warn);background:var(--warnB);border-radius:7px;padding:5px 8px;margin-top:6px}
  .muted{color:var(--soft);font-size:13px;text-align:center;padding:20px}
  .cal-head{display:flex;align-items:center;gap:12px;margin-bottom:12px} .cal-head h2{margin:0;font-size:17px;min-width:150px}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal .dow{font-size:12px;color:var(--soft);text-align:center;font-weight:600;padding:2px}
  .cal .cell{background:var(--panel);border:1px solid var(--line);border-radius:10px;min-height:92px;padding:6px}
  .cal .cell.out{background:var(--panel2);opacity:.5} .cal .cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .cal .cell .d{font-size:12px;color:var(--soft);font-weight:600;margin-bottom:4px}
  .cal .chip{font-size:11px;border-radius:5px;padding:2px 5px;margin-bottom:3px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .modal-bg{position:fixed;inset:0;background:rgba(10,12,16,.5);display:grid;place-items:center;z-index:40;padding:16px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:460px;padding:20px 22px;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 3px;font-size:16px} .modal .mid{font-size:12px;color:var(--soft);margin-bottom:14px}
  .modal .info{font-size:13px;color:var(--soft);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:14px;white-space:pre-wrap}
  .modal .acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;align-items:center}
  .stbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .stbtns button{border:1px solid var(--line);background:var(--panel2);color:var(--soft);border-radius:8px;padding:5px 10px;font-size:12.5px;cursor:pointer}
  .stbtns button.on{color:#fff;border-color:transparent}
  .eg-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .eg-item .egn{flex:1;font-weight:600}
  .tip{font-size:12px;color:var(--soft);background:var(--accentS);border-radius:9px;padding:9px 11px;margin:8px 0 12px;line-height:1.55}
  .thread{display:flex;flex-direction:column;gap:7px;max-height:230px;overflow:auto;padding:4px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
  .cmt{border-radius:9px;padding:7px 10px;font-size:12.5px;max-width:86%;line-height:1.5}
  .cmt .cw{font-size:10.5px;color:var(--soft);margin-bottom:2px}
  .cmt.pub{background:var(--accentS);align-self:flex-end;border:1px solid var(--line)}
  .cmt.asg{background:var(--okB);align-self:flex-start;border:1px solid var(--line)}
  .cmt.sys{align-self:center;background:transparent;color:var(--soft);font-size:11.5px;text-align:center;max-width:100%}
  .replybar{display:flex;gap:6px;margin-bottom:14px}
  .replybar input{flex:1;padding:8px 10px;border:1px solid var(--lineS);border-radius:8px;background:var(--panel);outline:none;font-size:13px}
  .rtable{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);font-size:13px}
  .rtable th,.rtable td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
  .rtable th{background:var(--panel2);color:var(--soft);font-size:12px;font-weight:600;white-space:nowrap}
  .rtable td{font-variant-numeric:tabular-nums} .rtable tr:last-child td{border-bottom:0}
  .rtable td.name{font-weight:650} .rate{font-weight:700;border-radius:5px;padding:1px 7px;font-size:12px}
  .rate.good{color:var(--ok);background:var(--okB)} .rate.mid{color:var(--warn);background:var(--warnB)} .rate.bad{color:var(--danger);background:var(--dangerB)}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:600;transition:.25s;pointer-events:none;z-index:60;box-shadow:var(--shadow)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)} #toast.err{background:var(--danger);color:#fff}
</style>
</head>
<body>
<div id="login">
  <div class="login-card">
    <h1>🤖 任务控制台</h1><p>输入密码进入。</p>
    <div class="field"><label>密码</label><input id="pw" type="password" placeholder="面板密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn wide" onclick="doLogin()">登录</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="app" class="hide">
  <header>
    <div class="logo">🤖 任务<span>控制台</span></div>
    <div class="tabs">
      <button id="tab-create" class="on" onclick="showTab('create')">派任务</button>
      <button id="tab-board" onclick="showTab('board')">看板</button>
      <button id="tab-cal" onclick="showTab('cal')">日历</button>
      <button id="tab-report" onclick="showTab('report')">报表</button>
    </div>
    <div class="sp"></div>
    <button class="btn ghost sm" onclick="openExtSettings()">⚙️ 外部群</button>
    <button class="btn ghost sm" onclick="logout()">退出</button>
  </header>
  <div class="wrap">
    <section id="view-create">
      <div class="form-card">
        <h2>派一个任务</h2>
        <p class="sub">选群 → 选负责人 → 填详情 → 派发。内部群走机器人；外部群走 webhook 推送。</p>
        <div class="row2">
          <div class="field"><label>群 *</label><select id="fGroup" onchange="onGroup()"><option value="">加载中…</option></select></div>
          <div class="field"><label>负责人 *</label>
            <select id="fAssignee"><option value="">先选群</option></select>
            <input id="fAssigneeName" class="hide" placeholder="填负责人名字（外部群直接打字）"></div>
        </div>
        <div class="field"><label>任务标题 *</label><input id="fTitle" placeholder="一句话说清要做什么"></div>
        <div class="field"><label>详情 / 安排</label><textarea id="fDetail" placeholder="具体怎么做、分几步、交付什么"></textarea></div>
        <div class="field"><label>注意事项</label><textarea id="fNote" placeholder="要注意的点、验收标准、易踩的坑"></textarea></div>
        <div class="row2">
          <div class="field"><label>优先级</label><select id="fPriority"><option>中</option><option>高</option><option>低</option></select></div>
          <div class="field"><label>截止日期</label><input id="fDeadline" type="date"></div>
        </div>
        <button class="btn wide" id="submitBtn" onclick="submitTask()">🚀 派发任务</button>
        <div class="err" id="createErr"></div>
      </div>
    </section>
    <section id="view-board" class="hide">
      <div class="stats" id="stats"></div>
      <div class="toolbar">
        <select id="flGroup" onchange="renderBoard()"><option value="">全部群</option></select>
        <select id="flAssignee" onchange="renderBoard()"><option value="">全部负责人</option></select>
        <select id="flStatus" onchange="renderBoard()"><option value="">全部状态</option><option value="pending">待接受</option><option value="accepted">进行中</option><option value="done">已完成</option><option value="issue">待沟通</option></select>
        <input class="search" id="flSearch" placeholder="🔍 搜索任务…" oninput="renderBoard()">
        <div class="sp"></div>
        <button class="btn ghost sm" onclick="exportCSV()">⬇ 导出</button>
        <button class="btn ghost sm" onclick="loadTasks()">🔄 刷新</button>
      </div>
      <div class="board" id="board"></div>
    </section>
    <section id="view-cal" class="hide">
      <div class="cal-head">
        <button class="btn ghost sm" onclick="calMove(-1)">←</button><h2 id="calTitle"></h2>
        <button class="btn ghost sm" onclick="calMove(1)">→</button><button class="btn ghost sm" onclick="calMove(0)">今天</button>
        <div class="sp"></div><button class="btn ghost sm" onclick="calSubscribe()">📅 订阅到我的日历</button>
      </div>
      <div class="cal" id="cal"></div>
    </section>
    <section id="view-report" class="hide">
      <div class="toolbar">
        <div style="font-weight:750;font-size:16px">📊 团队报表</div>
        <div class="sp"></div>
        <button class="btn ghost sm" onclick="calSubscribe()">📅 日历订阅</button>
        <button class="btn ghost sm" onclick="exportReport()">⬇ 导出周报(CSV)</button>
      </div>
      <div class="stats" id="reportTiles"></div>
      <div id="reportBody"></div>
    </section>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script>
let PW="", TASKS=[], GROUPS=[], GMAP={}, EGROUPS=[], EGMAP={}, MEMCACHE={}, calY=0, calM=0, TZLABEL="", TZOFF=null, WORKEND=22;
const dlText=d=>d?(d+(TZLABEL?(' '+TZLABEL):'')):'';
function localOf(d){if(!d||TZOFF==null)return'';const p=d.split('-').map(Number);const inst=Date.UTC(p[0],p[1]-1,p[2],WORKEND,0,0)-TZOFF*3600000;const vo=-new Date().getTimezoneOffset()/60;if(vo===TZOFF)return'';return '你当地约 '+new Date(inst).toLocaleString([],{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}
const STATUS=[{k:"pending",n:"待接受",c:"var(--s-pending)"},{k:"accepted",n:"进行中",c:"var(--s-accepted)"},{k:"done",n:"已完成",c:"var(--s-done)"},{k:"issue",n:"待沟通",c:"var(--s-issue)"}];
const SC={pending:"var(--s-pending)",accepted:"var(--s-accepted)",done:"var(--s-done)",issue:"var(--s-issue)"};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const val=id=>document.getElementById(id).value.trim();
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='show'+(e?' err':'');setTimeout(()=>t.className='',2400);}
async function api(path,opts={}){opts.headers=Object.assign({'X-Auth':PW,'Content-Type':'application/json'},opts.headers||{});const r=await fetch(path,opts);if(r.status===401){logout();throw new Error('401');}return r;}

async function doLogin(){const pw=document.getElementById('pw').value;document.getElementById('loginErr').textContent='';
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    if(!r.ok){document.getElementById('loginErr').textContent='密码不对，或后台还没设置面板密码';return;}
    PW=pw;sessionStorage.setItem('pw',pw);enterApp();}catch(e){document.getElementById('loginErr').textContent='连接失败';}}
function logout(){PW='';sessionStorage.removeItem('pw');document.getElementById('app').classList.add('hide');document.getElementById('login').classList.remove('hide');}
async function enterApp(){document.getElementById('login').classList.add('hide');document.getElementById('app').classList.remove('hide');
  const d=new Date();calY=d.getFullYear();calM=d.getMonth();await loadConfig();await loadExternalGroups();await loadGroups();loadTasks();}
async function loadConfig(){try{const c=await(await api('/api/config')).json();TZLABEL=c.tz_label||'';TZOFF=(c.tz_offset==null?null:c.tz_offset);WORKEND=c.work_end||22;}catch(e){TZLABEL='';TZOFF=null;}}
function showTab(t){['create','board','cal','report'].forEach(x=>{document.getElementById('tab-'+x).classList.toggle('on',x===t);document.getElementById('view-'+x).classList.toggle('hide',x!==t);});if(['board','cal','report'].includes(t))loadTasks();}

async function loadExternalGroups(){try{const gs=await(await api('/api/external-groups')).json();EGROUPS=Array.isArray(gs)?gs:[];EGMAP={};EGROUPS.forEach(g=>EGMAP[g.id]=g.name);}catch(e){EGROUPS=[];}}
async function loadGroups(){
  try{const gs=await(await api('/api/groups')).json();GROUPS=Array.isArray(gs)?gs:[];GMAP={};GROUPS.forEach(g=>GMAP[g.chat_id]=g);}catch(e){GROUPS=[];}
  const intOpts=GROUPS.map(g=>`<option value="${g.chat_id}" data-name="${esc(g.name)}">${g.external?'🌐':'🏠'} ${esc(g.name)}</option>`).join('');
  const extOpts=EGROUPS.map(g=>`<option value="ext:${g.id}" data-name="${esc(g.name)}">🌐 ${esc(g.name)}（外部·webhook）</option>`).join('');
  const sel=document.getElementById('fGroup');
  sel.innerHTML=(GROUPS.length||EGROUPS.length)?'<option value="">请选择群</option>'+intOpts+extOpts:'<option value="">（还没有群，先把机器人拉进内部群，或在“外部群”里加）</option>';
  document.getElementById('flGroup').innerHTML='<option value="">全部群</option>'+GROUPS.map(g=>`<option value="${g.chat_id}">${esc(g.name)}</option>`).join('')+EGROUPS.map(g=>`<option value="ext:${g.id}">${esc(g.name)}（外部）</option>`).join('');
}
async function membersOf(chatId){if(MEMCACHE[chatId])return MEMCACHE[chatId];try{const ms=await(await api('/api/members?chat_id='+encodeURIComponent(chatId))).json();MEMCACHE[chatId]=Array.isArray(ms)?ms:[];return MEMCACHE[chatId];}catch(e){return[];}}
async function onGroup(){
  const v=document.getElementById('fGroup').value,sel=document.getElementById('fAssignee'),inp=document.getElementById('fAssigneeName');
  if(v.startsWith('ext:')){sel.classList.add('hide');inp.classList.remove('hide');return;}
  inp.classList.add('hide');sel.classList.remove('hide');
  if(!v){sel.innerHTML='<option value="">先选群</option>';return;}
  sel.innerHTML='<option value="">加载中…</option>';const ms=await membersOf(v);
  sel.innerHTML=ms.length?'<option value="">请选择负责人</option>'+ms.map(m=>`<option value="${m.open_id}" data-name="${esc(m.name)}">${esc(m.name)}</option>`).join(''):'<option value="">（群里没有其他人）</option>';
}
async function submitTask(){
  const g=document.getElementById('fGroup'),gv=g.value,err=document.getElementById('createErr');err.textContent='';
  if(!gv){err.textContent='请选择群';return;}
  const title=val('fTitle');if(!title){err.textContent='请填写任务标题';return;}
  const base={title,detail:val('fDetail'),note:val('fNote'),priority:document.getElementById('fPriority').value,deadline:document.getElementById('fDeadline').value};
  let payload,isExt=gv.startsWith('ext:');
  if(isExt){payload=Object.assign({external_group_id:parseInt(gv.slice(4)),assignee_name:document.getElementById('fAssigneeName').value.trim()},base);}
  else{const a=document.getElementById('fAssignee');if(!a.value){err.textContent='请选择负责人';return;}
    payload=Object.assign({chat_id:gv,chat_name:g.selectedOptions[0]?.dataset.name||'',assignee_open_id:a.value,assignee_name:a.selectedOptions[0]?.dataset.name||''},base);}
  const b=document.getElementById('submitBtn');b.disabled=true;b.textContent='派发中…';
  try{const j=await(await api('/api/tasks',{method:'POST',body:JSON.stringify(payload)})).json();
    if(j.ok){toast(isExt?(j.pushed?'✅ 已推送到外部群':'⚠️ 已建，但推送失败（检查 webhook 网址）'):'✅ 已派发，机器人已 @ 负责人');
      ['fTitle','fDetail','fNote'].forEach(id=>document.getElementById(id).value='');document.getElementById('fDeadline').value='';document.getElementById('fAssigneeName').value='';}
    else err.textContent=j.error||'派发失败';
  }catch(e){err.textContent='派发失败，请重试';}
  b.disabled=false;b.textContent='🚀 派发任务';
}

async function loadTasks(){
  try{TASKS=await(await api('/api/tasks')).json();if(!Array.isArray(TASKS))TASKS=[];}catch(e){TASKS=[];}
  const names=[...new Set(TASKS.map(t=>t.assignee_name).filter(Boolean))];const fa=document.getElementById('flAssignee'),cur=fa.value;
  fa.innerHTML='<option value="">全部负责人</option>'+names.map(n=>`<option ${n===cur?'selected':''}>${esc(n)}</option>`).join('');
  renderStats();renderBoard();renderCalendar();renderReport();
}
function groupKey(t){return t.is_external?('ext:'+t.external_group_id):t.group_chat_id;}
function groupName(t){return t.is_external?(EGMAP[t.external_group_id]||'外部群'):(GMAP[t.group_chat_id]?.name||'');}
function overdue(t){return t.deadline&&(t.status==='pending'||t.status==='accepted')&&t.deadline<todayStr();}
function renderStats(){const by=k=>TASKS.filter(t=>t.status===k).length;const over=TASKS.filter(overdue).length;
  const tiles=[['总数',TASKS.length,''],['待接受',by('pending'),''],['进行中',by('accepted'),''],['已完成',by('done'),''],['待沟通',by('issue'),''],['已超期',over,'over']];
  document.getElementById('stats').innerHTML=tiles.map(([l,n,c])=>`<div class="stat ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');}
function filtered(){const g=document.getElementById('flGroup').value,a=document.getElementById('flAssignee').value,s=document.getElementById('flStatus').value,q=document.getElementById('flSearch').value.trim().toLowerCase();
  return TASKS.filter(t=>(!g||groupKey(t)===g)&&(!a||t.assignee_name===a)&&(!s||t.status===s)&&(!q||(t.title||'').toLowerCase().includes(q)||(t.detail||'').toLowerCase().includes(q)));}
function renderBoard(){const list=filtered();document.getElementById('board').innerHTML=STATUS.map(s=>`<div class="col"><h3><span class="dot" style="background:${s.c}"></span>${s.n}<span class="cnt">${list.filter(t=>t.status===s.k).length}</span></h3><div>${list.filter(t=>t.status===s.k).map(tcard).join('')||'<div class="muted">暂无</div>'}</div></div>`).join('');}
function tcard(t){const pri=t.priority?`<span class="pri ${t.priority}">${t.priority}</span>`:'';const who=t.assignee_name?`<span class="who">👤 ${esc(t.assignee_name)}</span>`:'';
  const dl=t.deadline?`<span>📅 ${dlText(t.deadline)}${overdue(t)?' ⚠️':''}</span>`:'';const gn=groupName(t);
  const grp=gn?`<div class="grp">📍 ${esc(gn)} ${t.is_external?'<span class="badge-ext">外部</span>':''}</div>`:'';
  const rsn=(t.status==='issue'&&t.result)?`<div class="rsn">💬 ${esc(t.result)}</div>`:'';
  const unread=t.unread?'<span class="unread" title="负责人有新留言未读"></span>':'';
  return `<div class="tcard ${overdue(t)?'over':''} ${t.unread?'unreadcard':''}" onclick="openTask(${t.id})">${unread}<div class="tt">#${t.id} ${esc(t.title||'')}</div><div class="meta">${pri}${who}${dl}</div>${grp}${rsn}</div>`;}

async function openTask(id){const t=TASKS.find(x=>x.id===id);if(!t)return;
  if(t.unread){t.unread=false;renderBoard();}
  let reassign='';
  if(!t.is_external){const ms=await membersOf(t.group_chat_id);
    reassign=`<div class="field"><label>负责人（改这里=换人，会给新负责人重发卡片）</label><select id="mAssignee">${ms.map(m=>`<option value="${m.open_id}" data-name="${esc(m.name)}" ${m.open_id===t.assignee_open_id?'selected':''}>${esc(m.name)}</option>`).join('')||'<option value="">（无成员）</option>'}</select></div>`;}
  const info=[t.detail?'详情 / 安排：'+t.detail:'',t.note?'注意事项：'+t.note:'',t.result?'最新反馈：'+t.result:''].filter(Boolean).map(esc).join('\n')||'（无更多详情）';
  const link=(t.is_external&&t.token)?(location.origin+'/t/'+t.token):'';
  const linkRow=link?`<div class="field"><label>单独发给负责人的链接（可选）</label><div style="font-size:11.5px;color:var(--soft);margin:-2px 0 5px;line-height:1.5">不想在群里 @所有人打扰大家时，可以把这个链接私发给负责人本人；他打开就能接受任务、汇报进度，效果和群里那张卡片一样。</div><div style="display:flex;gap:6px"><input id="mLink" readonly value="${esc(link)}" onclick="this.select()" style="flex:1;padding:8px 10px;border:1px solid var(--lineS);border-radius:8px;background:var(--panel2);color:var(--ink);font-size:12px"><button class="btn sm" onclick="copyLink()">复制</button></div></div>`:'';
  const tzHint=(t.deadline&&localOf(t.deadline))?`<div style="font-size:12px;color:var(--accent);background:var(--accentS);border-radius:8px;padding:7px 10px;margin-bottom:12px">🌐 截止 ${esc(dlText(t.deadline))}　·　${esc(localOf(t.deadline))}</div>`:'';
  const stb=STATUS.map(s=>`<button class="${t.status===s.k?'on':''}" style="${t.status===s.k?'background:'+s.c:''}" onclick="setStatus(${t.id},'${s.k}')">${s.n}</button>`).join('');
  document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>#${t.id} ${esc(t.title||'')}</h3>
    <div class="mid">${esc(groupName(t))} ${t.is_external?'· 外部群':''} · 状态：${STATUS.find(s=>s.k===t.status)?.n||t.status}</div>
    <div class="info">${info}</div>
    ${tzHint}
    ${linkRow}
    <label style="font-size:12.5px;color:var(--soft);font-weight:600">💬 沟通记录（和负责人商量，都会留痕）</label>
    <div class="thread" id="mThread"><div class="muted" style="padding:6px">加载中…</div></div>
    <div class="replybar"><input id="mReply" placeholder="回复负责人…" onkeydown="if(event.key==='Enter')postComment(${t.id})"><button class="btn sm" onclick="postComment(${t.id})">发送</button></div>
    <label style="font-size:12.5px;color:var(--soft);font-weight:600">手动设置状态</label><div class="stbtns">${stb}</div>
    <div class="row2"><div class="field"><label>截止日期${TZLABEL?'（'+esc(TZLABEL)+'）':''}</label><input id="mDeadline" type="date" value="${t.deadline||''}"></div>
    <div class="field"><label>优先级</label><select id="mPriority">${['高','中','低'].map(p=>`<option ${p===t.priority?'selected':''}>${p}</option>`).join('')}</select></div></div>
    ${reassign}
    <div class="acts"><button class="btn sm" onclick="saveTask(${t.id})">💾 保存修改</button>
    ${t.is_external?'':`<button class="btn ghost sm" onclick="nudgeTask(${t.id})">⏰ 催办</button>`}
    <div style="flex:1"></div><button class="btn danger sm" onclick="delTask(${t.id})">🗑 删除</button>
    <button class="btn ghost sm" onclick="closeModal()">关闭</button></div>
  </div></div>`;loadComments(id);}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}
function copyLink(){const el=document.getElementById('mLink');if(!el)return;el.select();try{navigator.clipboard.writeText(el.value);}catch(e){try{document.execCommand('copy');}catch(_){}}toast('✅ 链接已复制，可直接发给负责人本人');}
function fmtTime(s){if(!s)return'';const d=new Date(s);if(isNaN(d))return esc(s);return (d.getMonth()+1)+'-'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
const SIDE_CLS={publisher:'pub',assignee:'asg',system:'sys'},SIDE_NM={publisher:'发布者',assignee:'负责人',system:''};
function renderThread(cs){const el=document.getElementById('mThread');if(!el)return;
  if(!cs.length){el.innerHTML='<div class="muted" style="padding:6px">还没有沟通记录。派发、接受、完成、反馈都会自动记在这里。</div>';return;}
  el.innerHTML=cs.map(c=>{const cls=SIDE_CLS[c.author_side]||'sys';const nm=c.author_name||SIDE_NM[c.author_side]||'';const head=(c.author_side==='system')?fmtTime(c.created_at):(esc(nm)+' · '+fmtTime(c.created_at));return `<div class="cmt ${cls}"><div class="cw">${head}</div><div>${esc(c.body)}</div></div>`;}).join('');
  el.scrollTop=el.scrollHeight;}
async function loadComments(id){try{const cs=await(await api('/api/tasks/'+id+'/comments')).json();renderThread(Array.isArray(cs)?cs:[]);}catch(e){renderThread([]);}}
async function postComment(id){const inp=document.getElementById('mReply');const v=(inp.value||'').trim();if(!v)return;inp.value='';
  try{await api('/api/tasks/'+id+'/comments',{method:'POST',body:JSON.stringify({body:v})});loadComments(id);toast('✅ 已回复负责人');}catch(e){toast('发送失败',true);inp.value=v;}}
async function setStatus(id,st){try{await api('/api/tasks/'+id,{method:'PATCH',body:JSON.stringify({status:st})});toast('✅ 状态已更新');closeModal();loadTasks();}catch(e){toast('更新失败',true);}}
async function saveTask(id){const t=TASKS.find(x=>x.id===id);const body={deadline:document.getElementById('mDeadline').value,priority:document.getElementById('mPriority').value};
  const a=document.getElementById('mAssignee');if(a&&a.value&&a.value!==t.assignee_open_id){body.assignee_open_id=a.value;body.assignee_name=a.selectedOptions[0]?.dataset.name||'';}
  try{await api('/api/tasks/'+id,{method:'PATCH',body:JSON.stringify(body)});toast('✅ 已保存');closeModal();loadTasks();}catch(e){toast('保存失败',true);}}
async function nudgeTask(id){try{await api('/api/tasks/'+id+'/nudge',{method:'POST'});toast('⏰ 已在群里催办');}catch(e){toast('催办失败',true);}}
async function delTask(id){if(!confirm('确定删除任务 #'+id+'？'))return;try{await api('/api/tasks/'+id,{method:'DELETE'});toast('🗑 已删除');closeModal();loadTasks();}catch(e){toast('删除失败',true);}}

function calMove(dir){if(dir===0){const d=new Date();calY=d.getFullYear();calM=d.getMonth();}else{calM+=dir;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}}renderCalendar();}
function renderCalendar(){const cal=document.getElementById('cal');if(!cal)return;document.getElementById('calTitle').textContent=calY+' 年 '+(calM+1)+' 月';
  const start=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate(),dows=['日','一','二','三','四','五','六'];
  let html=dows.map(d=>`<div class="dow">${d}</div>`).join('');const byDay={};TASKS.forEach(t=>{if(t.deadline){(byDay[t.deadline]=byDay[t.deadline]||[]).push(t);}});
  for(let i=0;i<start;i++)html+=`<div class="cell out"></div>`;
  for(let d=1;d<=days;d++){const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');const list=byDay[ds]||[];
    const chips=list.slice(0,4).map(t=>{const lbl=esc(t.title)+(t.assignee_name?' · '+esc(t.assignee_name):'');return `<div class="chip" style="background:${SC[t.status]||'#888'}" onclick="openTask(${t.id})" title="${lbl}">${lbl}</div>`;}).join('')+(list.length>4?`<div class="grp">+${list.length-4}</div>`:'');
    html+=`<div class="cell ${ds===todayStr()?'today':''}"><div class="d">${d}</div>${chips}</div>`;}
  cal.innerHTML=html;}

function exportCSV(){const rows=[['ID','标题','状态','优先级','负责人','截止','群','内/外','详情','注意','反馈']];const sn={pending:'待接受',accepted:'进行中',done:'已完成',issue:'待沟通'};
  filtered().forEach(t=>rows.push([t.id,t.title||'',sn[t.status]||t.status,t.priority||'',t.assignee_name||'',t.deadline||'',groupName(t),t.is_external?'外部':'内部',t.detail||'',t.note||'',t.result||'']));
  const csv='﻿'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='任务导出.csv';a.click();}

// ---- 报表 / 日历订阅 ----
function daysBetween(a,b){const x=new Date(a),y=new Date(b);if(isNaN(x)||isNaN(y))return null;return Math.max(0,Math.round((y-x)/86400000));}
function reportRows(){const byP={};TASKS.forEach(t=>{const n=t.assignee_name||'(未指定)';(byP[n]=byP[n]||[]).push(t);});
  return Object.entries(byP).map(([name,ts])=>{const done=ts.filter(t=>t.status==='done');
    const onTime=done.filter(t=>!t.deadline||(t.updated_at&&t.updated_at.slice(0,10)<=t.deadline)).length;
    const rate=done.length?Math.round(onTime/done.length*100):null;
    const durs=done.map(t=>daysBetween(t.created_at,t.updated_at)).filter(x=>x!=null);
    const avg=durs.length?(durs.reduce((a,b)=>a+b,0)/durs.length):null;
    return {name,total:ts.length,done:done.length,onTime,rate,overdueN:ts.filter(overdue).length,avg};}).sort((a,b)=>b.total-a.total);}
function rateCls(r){return r==null?'':(r>=90?'good':(r>=70?'mid':'bad'));}
function renderReport(){const body=document.getElementById('reportBody');if(!body)return;
  const tot=TASKS.length,done=TASKS.filter(t=>t.status==='done').length,over=TASKS.filter(overdue).length;
  const allOn=TASKS.filter(t=>t.status==='done'&&(!t.deadline||(t.updated_at&&t.updated_at.slice(0,10)<=t.deadline))).length;
  const orate=done?Math.round(allOn/done*100)+'%':'—';
  document.getElementById('reportTiles').innerHTML=[['总任务',tot,''],['已完成',done,''],['按时率',orate,''],['超期',over,'over']].map(([l,n,c])=>`<div class="stat ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
  const rows=reportRows();
  body.innerHTML=rows.length?`<table class="rtable"><thead><tr><th>负责人</th><th>总数</th><th>已完成</th><th>按时完成</th><th>按时率</th><th>超期</th><th>平均用时(天)</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="name">${esc(r.name)}</td><td>${r.total}</td><td>${r.done}</td><td>${r.onTime}</td><td>${r.rate==null?'—':`<span class="rate ${rateCls(r.rate)}">${r.rate}%</span>`}</td><td>${r.overdueN}</td><td>${r.avg==null?'—':r.avg.toFixed(1)}</td></tr>`).join('')}</tbody></table>`:'<div class="muted">还没有任务数据</div>';}
function exportReport(){const rows=reportRows();const head=['负责人','总数','已完成','按时完成','按时率','超期','平均用时(天)'];
  const data=rows.map(r=>[r.name,r.total,r.done,r.onTime,r.rate==null?'':r.rate+'%',r.overdueN,r.avg==null?'':r.avg.toFixed(1)]);
  const csv='﻿'+[head,...data].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='团队周报.csv';a.click();}
function calSubscribe(){const url=location.origin+'/calendar.ics?pw='+encodeURIComponent(PW);
  document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>📅 订阅任务日历</h3><div class="mid">把所有任务的截止日期同步进你的日历（Google / Apple / 飞书日历），到点自动提醒。</div>
    <div class="tip">用法：复制下面链接 → 打开日历 App → “添加日历 / 从网址订阅” → 粘贴。以后新派的任务会自动出现，无需重复添加。</div>
    <div class="field"><label>订阅链接（含你的密码，请勿外发）</label><div style="display:flex;gap:6px"><input id="icsUrl" readonly value="${esc(url)}" onclick="this.select()" style="flex:1;padding:8px 10px;border:1px solid var(--lineS);border-radius:8px;background:var(--panel2);color:var(--ink);font-size:12px"><button class="btn sm" onclick="copyIcs()">复制</button></div></div>
    <div class="acts" style="margin-top:12px"><div style="flex:1"></div><button class="btn ghost sm" onclick="closeModal()">关闭</button></div>
  </div></div>`;}
function copyIcs(){const el=document.getElementById('icsUrl');if(!el)return;el.select();try{navigator.clipboard.writeText(el.value);}catch(e){try{document.execCommand('copy');}catch(_){}}toast('✅ 链接已复制');}

// ---- 外部群设置 ----
async function openExtSettings(){
  const list=EGROUPS.map(g=>`<div class="eg-item"><span class="egn">🌐 ${esc(g.name)}</span><button class="btn danger sm" onclick="delExtGroup(${g.id})">删除</button></div>`).join('')||'<div class="muted">还没有外部群</div>';
  document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>⚙️ 外部群设置</h3><div class="mid">外部群加不了应用机器人，只能用 webhook 推送。</div>
    <div class="tip">怎么拿 webhook：在外部群里 → 设置 → 添加机器人 → 选 <b>Custom Bot</b> → 创建后复制它的 <b>Webhook 网址</b>，粘到下面。</div>
    <div id="egList">${list}</div>
    <div style="margin-top:14px"><div class="field"><label>外部群名字（自己起，方便识别）</label><input id="egName" placeholder="如：供应商 21win 群"></div>
    <div class="field"><label>Webhook 网址</label><input id="egUrl" placeholder="https://open.larksuite.com/open-apis/bot/v2/hook/..."></div>
    <button class="btn wide" onclick="addExtGroup()">＋ 添加外部群</button><div class="err" id="egErr"></div></div>
    <div class="acts" style="margin-top:12px"><div style="flex:1"></div><button class="btn ghost sm" onclick="closeModal()">关闭</button></div>
  </div></div>`;}
async function addExtGroup(){const name=val('egName'),url=val('egUrl'),err=document.getElementById('egErr');err.textContent='';
  if(!name||!url){err.textContent='名字和 webhook 网址都要填';return;}
  try{const j=await(await api('/api/external-groups',{method:'POST',body:JSON.stringify({name,webhook_url:url})})).json();
    if(j.ok){await loadExternalGroups();await loadGroups();openExtSettings();toast('✅ 已添加外部群');}else err.textContent=j.error||'添加失败';
  }catch(e){err.textContent='添加失败';}}
async function delExtGroup(id){if(!confirm('删除这个外部群配置？'))return;try{await api('/api/external-groups/'+id,{method:'DELETE'});await loadExternalGroups();await loadGroups();openExtSettings();toast('已删除');}catch(e){toast('删除失败',true);}}

// 每 20 秒自动刷新看板（让负责人的新留言红点及时出现），弹窗打开时不打扰
setInterval(()=>{const app=document.getElementById('app');const modalOpen=document.getElementById('modalRoot').innerHTML.trim();
  if(PW&&app&&!app.classList.contains('hide')&&!modalOpen)loadTasks();},20000);

const saved=sessionStorage.getItem('pw');if(saved){PW=saved;enterApp();}
</script>
