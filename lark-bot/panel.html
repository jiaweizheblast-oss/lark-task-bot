<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务控制台</title>
<style>
  :root{
    --bg:#f6f7f9;--panel:#fff;--panel2:#fbfbfd;--ink:#1c2024;--soft:#5b636b;--line:#e7e9ec;--lineS:#d7dade;
    --accent:#5b5bd6;--accentS:#eceafc;--ok:#16a34a;--okB:#e8f6ec;--warn:#c2740a;--warnB:#fdf1e3;--danger:#dc2626;--dangerB:#fdecec;
    --p-hi:#dc2626;--p-mid:#c2740a;--p-lo:#16a34a;--shadow:0 1px 2px rgba(20,25,35,.05),0 4px 16px rgba(20,25,35,.06);
    --s-pending:#5b5bd6;--s-accepted:#0d9488;--s-done:#16a34a;--s-issue:#c2740a;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#0e1013;--panel:#171a1f;--panel2:#1c2026;--ink:#e6e8eb;--soft:#9aa2ab;--line:#262b31;--lineS:#333a42;
    --accent:#8b8bf0;--accentS:#23233a;--ok:#4ade80;--okB:#16281c;--warn:#e5a44b;--warnB:#33280f;--danger:#f87171;--dangerB:#38201f;
    --p-hi:#f87171;--p-mid:#e5a44b;--p-lo:#4ade80;--shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.3);
    --s-pending:#8b8bf0;--s-accepted:#2dd4bf;--s-done:#4ade80;--s-issue:#e5a44b;}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:15px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  input,select,textarea,button{font-family:inherit;font-size:14px;color:var(--ink)}
  .hide{display:none!important}

  #login{min-height:100vh;display:grid;place-items:center;padding:20px}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:28px 26px;width:100%;max-width:360px;text-align:center}
  .login-card h1{font-size:20px;margin:0 0 4px}
  .login-card p{color:var(--soft);font-size:13px;margin:0 0 18px}
  .field{text-align:left;margin-bottom:12px}
  .field label{display:block;font-size:12.5px;color:var(--soft);margin-bottom:5px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--lineS);border-radius:9px;background:var(--panel2);outline:none;transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--panel)}
  .field textarea{resize:vertical;min-height:60px}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:10px 16px;font-weight:650;cursor:pointer;transition:.15s;font-size:14px}
  .btn:hover{filter:brightness(1.06)} .btn:disabled{opacity:.5;cursor:default}
  .btn.wide{width:100%}
  .btn.ghost{background:transparent;color:var(--soft);border:1px solid var(--line)}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
  .btn.danger{background:var(--danger)}
  .err{color:var(--danger);font-size:12.5px;margin-top:8px;min-height:16px}

  header{position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:11px 18px}
  header .logo{font-weight:750;font-size:16px} header .logo span{color:var(--accent)}
  .tabs{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
  .tabs button{border:0;background:transparent;color:var(--soft);font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer}
  .tabs button.on{background:var(--accent);color:#fff}
  header .sp{flex:1}
  .wrap{max-width:1200px;margin:0 auto;padding:18px}

  .form-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:22px 24px;max-width:640px;margin:0 auto}
  .form-card h2{margin:0 0 4px;font-size:17px}
  .form-card .sub{color:var(--soft);font-size:13px;margin:0 0 18px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.row2{grid-template-columns:1fr}}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
  @media(max-width:760px){.stats{grid-template-columns:repeat(3,1fr)}}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;box-shadow:var(--shadow)}
  .stat .n{font-size:22px;font-weight:750;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .stat .l{font-size:11.5px;color:var(--soft);margin-top:1px}
  .stat.over .n{color:var(--danger)}

  /* toolbar */
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar select,.toolbar input{padding:7px 10px;border:1px solid var(--lineS);border-radius:9px;background:var(--panel);outline:none;font-size:13px}
  .toolbar input.search{flex:1;min-width:150px}
  .toolbar .sp{flex:1}

  /* board */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:900px){.board{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.board{grid-template-columns:1fr}}
  .col{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:10px;min-height:120px}
  .col h3{margin:2px 4px 10px;font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:7px}
  .col h3 .dot{width:9px;height:9px;border-radius:50%}
  .col h3 .cnt{margin-left:auto;color:var(--soft);font-weight:600;font-size:12px;background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:1px 8px}
  .tcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow);cursor:pointer;transition:.12s}
  .tcard:hover{border-color:var(--accent)}
  .tcard.over{border-left:3px solid var(--danger)}
  .tcard .tt{font-weight:650;font-size:13.5px;margin-bottom:6px}
  .tcard .meta{font-size:12px;color:var(--soft);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .tcard .who{color:var(--ink);font-weight:600}
  .pri{font-size:11px;font-weight:750;border-radius:5px;padding:1px 6px}
  .pri.高{color:#fff;background:var(--p-hi)} .pri.中{color:#fff;background:var(--p-mid)} .pri.低{color:#fff;background:var(--p-lo)}
  .tcard .grp{font-size:11px;color:var(--soft)}
  .tcard .rsn{font-size:12px;color:var(--warn);background:var(--warnB);border-radius:7px;padding:5px 8px;margin-top:6px}
  .muted{color:var(--soft);font-size:13px;text-align:center;padding:20px}

  /* calendar */
  .cal-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .cal-head h2{margin:0;font-size:17px;min-width:150px}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal .dow{font-size:12px;color:var(--soft);text-align:center;font-weight:600;padding:2px}
  .cal .cell{background:var(--panel);border:1px solid var(--line);border-radius:10px;min-height:92px;padding:6px}
  .cal .cell.out{background:var(--panel2);opacity:.5}
  .cal .cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .cal .cell .d{font-size:12px;color:var(--soft);font-weight:600;margin-bottom:4px}
  .cal .chip{font-size:11px;border-radius:5px;padding:2px 5px;margin-bottom:3px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(10,12,16,.5);display:grid;place-items:center;z-index:40;padding:16px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:440px;padding:20px 22px;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 3px;font-size:16px}
  .modal .mid{font-size:12px;color:var(--soft);margin-bottom:14px}
  .modal .info{font-size:13px;color:var(--soft);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:14px;white-space:pre-wrap}
  .modal .acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}

  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:600;transition:.25s;pointer-events:none;z-index:60;box-shadow:var(--shadow)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.err{background:var(--danger);color:#fff}
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <h1>🤖 任务控制台</h1>
    <p>输入密码进入。</p>
    <div class="field"><label>密码</label>
      <input id="pw" type="password" placeholder="面板密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn wide" onclick="doLogin()">登录</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="app" class="hide">
  <header>
    <div class="logo">🤖 任务<span>控制台</span></div>
    <div class="tabs">
      <button id="tab-create" class="on" onclick="showTab('create')">派任务</button>
      <button id="tab-board" onclick="showTab('board')">看板</button>
      <button id="tab-cal" onclick="showTab('cal')">日历</button>
    </div>
    <div class="sp"></div>
    <button class="btn ghost sm" onclick="logout()">退出</button>
  </header>

  <div class="wrap">
    <!-- 派任务 -->
    <section id="view-create">
      <div class="form-card">
        <h2>派一个任务</h2>
        <p class="sub">选群 → 选负责人 → 填详情 → 派发。机器人会去群里 @ 负责人。</p>
        <div class="row2">
          <div class="field"><label>群 *</label><select id="fGroup" onchange="onGroup()"><option value="">加载中…</option></select></div>
          <div class="field"><label>负责人 *</label><select id="fAssignee"><option value="">先选群</option></select></div>
        </div>
        <div class="field"><label>任务标题 *</label><input id="fTitle" placeholder="一句话说清要做什么"></div>
        <div class="field"><label>详情 / 安排</label><textarea id="fDetail" placeholder="具体怎么做、分几步、交付什么"></textarea></div>
        <div class="field"><label>注意事项</label><textarea id="fNote" placeholder="要注意的点、验收标准、易踩的坑"></textarea></div>
        <div class="row2">
          <div class="field"><label>优先级</label><select id="fPriority"><option>中</option><option>高</option><option>低</option></select></div>
          <div class="field"><label>截止日期</label><input id="fDeadline" type="date"></div>
        </div>
        <button class="btn wide" id="submitBtn" onclick="submitTask()">🚀 派发任务</button>
        <div class="err" id="createErr"></div>
      </div>
    </section>

    <!-- 看板 -->
    <section id="view-board" class="hide">
      <div class="stats" id="stats"></div>
      <div class="toolbar">
        <select id="flGroup" onchange="renderBoard()"><option value="">全部群</option></select>
        <select id="flAssignee" onchange="renderBoard()"><option value="">全部负责人</option></select>
        <select id="flStatus" onchange="renderBoard()">
          <option value="">全部状态</option><option value="pending">待接受</option><option value="accepted">进行中</option>
          <option value="done">已完成</option><option value="issue">待沟通</option></select>
        <input class="search" id="flSearch" placeholder="🔍 搜索任务标题…" oninput="renderBoard()">
        <div class="sp"></div>
        <button class="btn ghost sm" onclick="exportCSV()">⬇ 导出</button>
        <button class="btn ghost sm" onclick="loadTasks()">🔄 刷新</button>
      </div>
      <div class="board" id="board"></div>
    </section>

    <!-- 日历 -->
    <section id="view-cal" class="hide">
      <div class="cal-head">
        <button class="btn ghost sm" onclick="calMove(-1)">←</button>
        <h2 id="calTitle"></h2>
        <button class="btn ghost sm" onclick="calMove(1)">→</button>
        <button class="btn ghost sm" onclick="calMove(0)">今天</button>
      </div>
      <div class="cal" id="cal"></div>
    </section>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toast"></div>

<script>
let PW="", TASKS=[], GROUPS=[], GMAP={}, MEMCACHE={};
let calY=0, calM=0;
const STATUS=[{k:"pending",n:"待接受",c:"var(--s-pending)"},{k:"accepted",n:"进行中",c:"var(--s-accepted)"},
              {k:"done",n:"已完成",c:"var(--s-done)"},{k:"issue",n:"待沟通",c:"var(--s-issue)"}];
const SC={pending:"var(--s-pending)",accepted:"var(--s-accepted)",done:"var(--s-done)",issue:"var(--s-issue)"};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};

function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='show'+(e?' err':'');setTimeout(()=>t.className='',2200);}
async function api(path,opts={}){opts.headers=Object.assign({'X-Auth':PW,'Content-Type':'application/json'},opts.headers||{});
  const r=await fetch(path,opts); if(r.status===401){logout();throw new Error('401');} return r;}

async function doLogin(){
  const pw=document.getElementById('pw').value; document.getElementById('loginErr').textContent='';
  try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    if(!r.ok){document.getElementById('loginErr').textContent='密码不对，或后台还没设置面板密码';return;}
    PW=pw; sessionStorage.setItem('pw',pw); enterApp();
  }catch(e){document.getElementById('loginErr').textContent='连接失败，请稍后再试';}
}
function logout(){PW='';sessionStorage.removeItem('pw');document.getElementById('app').classList.add('hide');document.getElementById('login').classList.remove('hide');}
async function enterApp(){
  document.getElementById('login').classList.add('hide'); document.getElementById('app').classList.remove('hide');
  const d=new Date(); calY=d.getFullYear(); calM=d.getMonth();
  await loadGroups(); loadTasks();
}
function showTab(t){
  ['create','board','cal'].forEach(x=>{document.getElementById('tab-'+x).classList.toggle('on',x===t);
    document.getElementById('view-'+x).classList.toggle('hide',x!==t);});
  if(t==='board'||t==='cal') loadTasks();
}

async function loadGroups(){
  try{const gs=await(await api('/api/groups')).json();
    GROUPS=Array.isArray(gs)?gs:[]; GMAP={}; GROUPS.forEach(g=>GMAP[g.chat_id]=g);
    const sel=document.getElementById('fGroup');
    sel.innerHTML=GROUPS.length? '<option value="">请选择群</option>'+GROUPS.map(g=>`<option value="${g.chat_id}" data-name="${esc(g.name)}">${g.external?'🌐':'🏠'} ${esc(g.name)}</option>`).join('')
                               : '<option value="">（机器人还没进任何群）</option>';
    const fg=document.getElementById('flGroup');
    fg.innerHTML='<option value="">全部群</option>'+GROUPS.map(g=>`<option value="${g.chat_id}">${esc(g.name)}</option>`).join('');
  }catch(e){}
}
async function membersOf(chatId){
  if(MEMCACHE[chatId]) return MEMCACHE[chatId];
  try{const ms=await(await api('/api/members?chat_id='+encodeURIComponent(chatId))).json();
    MEMCACHE[chatId]=Array.isArray(ms)?ms:[]; return MEMCACHE[chatId];
  }catch(e){return [];}
}
async function onGroup(){
  const chatId=document.getElementById('fGroup').value, asg=document.getElementById('fAssignee');
  if(!chatId){asg.innerHTML='<option value="">先选群</option>';return;}
  asg.innerHTML='<option value="">加载中…</option>';
  const ms=await membersOf(chatId);
  asg.innerHTML=ms.length? '<option value="">请选择负责人</option>'+ms.map(m=>`<option value="${m.open_id}" data-name="${esc(m.name)}">${esc(m.name)}</option>`).join('')
                         : '<option value="">（群里没有其他人）</option>';
}
async function submitTask(){
  const g=document.getElementById('fGroup'),a=document.getElementById('fAssignee');
  const p={chat_id:g.value,chat_name:g.selectedOptions[0]?.dataset.name||'',assignee_open_id:a.value,
    assignee_name:a.selectedOptions[0]?.dataset.name||'',title:val('fTitle'),detail:val('fDetail'),note:val('fNote'),
    priority:document.getElementById('fPriority').value,deadline:document.getElementById('fDeadline').value};
  const err=document.getElementById('createErr'); err.textContent='';
  if(!p.chat_id||!p.assignee_open_id){err.textContent='请选择群和负责人';return;}
  if(!p.title){err.textContent='请填写任务标题';return;}
  const b=document.getElementById('submitBtn'); b.disabled=true; b.textContent='派发中…';
  try{const j=await(await api('/api/tasks',{method:'POST',body:JSON.stringify(p)})).json();
    if(j.ok){toast('✅ 已派发，机器人已 @ 负责人'); ['fTitle','fDetail','fNote'].forEach(id=>document.getElementById(id).value=''); document.getElementById('fDeadline').value='';}
    else err.textContent=j.error||'派发失败';
  }catch(e){err.textContent='派发失败，请重试';}
  b.disabled=false; b.textContent='🚀 派发任务';
}
const val=id=>document.getElementById(id).value.trim();

async function loadTasks(){
  try{TASKS=await(await api('/api/tasks')).json(); if(!Array.isArray(TASKS))TASKS=[];}catch(e){TASKS=[];}
  // 填负责人筛选
  const names=[...new Set(TASKS.map(t=>t.assignee_name).filter(Boolean))];
  const fa=document.getElementById('flAssignee'), cur=fa.value;
  fa.innerHTML='<option value="">全部负责人</option>'+names.map(n=>`<option ${n===cur?'selected':''}>${esc(n)}</option>`).join('');
  renderStats(); renderBoard(); renderCalendar();
}
function overdue(t){return t.deadline && (t.status==='pending'||t.status==='accepted') && t.deadline < todayStr();}
function renderStats(){
  const by=k=>TASKS.filter(t=>t.status===k).length;
  const over=TASKS.filter(overdue).length;
  const tiles=[['总数',TASKS.length,''],['待接受',by('pending'),''],['进行中',by('accepted'),''],
    ['已完成',by('done'),''],['待沟通',by('issue'),''],['已超期',over,'over']];
  document.getElementById('stats').innerHTML=tiles.map(([l,n,c])=>`<div class="stat ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
}
function filtered(){
  const g=document.getElementById('flGroup').value,a=document.getElementById('flAssignee').value,
        s=document.getElementById('flStatus').value,q=document.getElementById('flSearch').value.trim().toLowerCase();
  return TASKS.filter(t=>(!g||t.group_chat_id===g)&&(!a||t.assignee_name===a)&&(!s||t.status===s)
    &&(!q||(t.title||'').toLowerCase().includes(q)||(t.detail||'').toLowerCase().includes(q)));
}
function renderBoard(){
  const list=filtered(), board=document.getElementById('board');
  board.innerHTML=STATUS.map(s=>`<div class="col"><h3><span class="dot" style="background:${s.c}"></span>${s.n}<span class="cnt">${list.filter(t=>t.status===s.k).length}</span></h3><div>${
    list.filter(t=>t.status===s.k).map(tcard).join('')||'<div class="muted">暂无</div>'}</div></div>`).join('');
}
function tcard(t){
  const pri=t.priority?`<span class="pri ${t.priority}">${t.priority}</span>`:'';
  const who=t.assignee_name?`<span class="who">👤 ${esc(t.assignee_name)}</span>`:'';
  const dl=t.deadline?`<span>📅 ${t.deadline}${overdue(t)?' ⚠️':''}</span>`:'';
  const grp=GMAP[t.group_chat_id]?`<div class="grp">📍 ${esc(GMAP[t.group_chat_id].name)}</div>`:'';
  const rsn=(t.status==='issue'&&t.result)?`<div class="rsn">💬 ${esc(t.result)}</div>`:'';
  return `<div class="tcard ${overdue(t)?'over':''}" onclick="openTask(${t.id})"><div class="tt">#${t.id} ${esc(t.title||'')}</div>
    <div class="meta">${pri}${who}${dl}</div>${grp}${rsn}</div>`;
}

// ---- task modal ----
async function openTask(id){
  const t=TASKS.find(x=>x.id===id); if(!t)return;
  const ms=await membersOf(t.group_chat_id);
  const opts=ms.map(m=>`<option value="${m.open_id}" data-name="${esc(m.name)}" ${m.open_id===t.assignee_open_id?'selected':''}>${esc(m.name)}</option>`).join('');
  const info=[t.detail?'详情：'+t.detail:'',t.note?'注意：'+t.note:'',t.result?'反馈：'+t.result:''].filter(Boolean).map(esc).join('\n')||'（无更多详情）';
  document.getElementById('modalRoot').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>#${t.id} ${esc(t.title||'')}</h3>
      <div class="mid">群：${esc(GMAP[t.group_chat_id]?.name||'')} · 状态：${STATUS.find(s=>s.k===t.status)?.n||t.status}</div>
      <div class="info">${info}</div>
      <div class="row2">
        <div class="field"><label>截止日期</label><input id="mDeadline" type="date" value="${t.deadline||''}"></div>
        <div class="field"><label>优先级</label><select id="mPriority">
          ${['高','中','低'].map(p=>`<option ${p===t.priority?'selected':''}>${p}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>负责人（改这里=换人，会给新负责人重发卡片）</label><select id="mAssignee">${opts||'<option value="">（无成员）</option>'}</select></div>
      <div class="acts">
        <button class="btn sm" onclick="saveTask(${t.id})">💾 保存修改</button>
        <button class="btn ghost sm" onclick="nudgeTask(${t.id})">⏰ 催办</button>
        <div class="sp" style="flex:1"></div>
        <button class="btn danger sm" onclick="delTask(${t.id})">🗑 删除</button>
        <button class="btn ghost sm" onclick="closeModal()">关闭</button>
      </div>
    </div>
  </div>`;
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}
async function saveTask(id){
  const t=TASKS.find(x=>x.id===id);
  const a=document.getElementById('mAssignee');
  const body={deadline:document.getElementById('mDeadline').value,priority:document.getElementById('mPriority').value};
  if(a.value && a.value!==t.assignee_open_id){body.assignee_open_id=a.value; body.assignee_name=a.selectedOptions[0]?.dataset.name||'';}
  try{await api('/api/tasks/'+id,{method:'PATCH',body:JSON.stringify(body)}); toast('✅ 已保存'); closeModal(); loadTasks();}
  catch(e){toast('保存失败',true);}
}
async function nudgeTask(id){try{await api('/api/tasks/'+id+'/nudge',{method:'POST'}); toast('⏰ 已在群里催办');}catch(e){toast('催办失败',true);}}
async function delTask(id){ if(!confirm('确定删除任务 #'+id+'？')) return;
  try{await api('/api/tasks/'+id,{method:'DELETE'}); toast('🗑 已删除'); closeModal(); loadTasks();}catch(e){toast('删除失败',true);}}

// ---- calendar ----
function calMove(dir){ if(dir===0){const d=new Date();calY=d.getFullYear();calM=d.getMonth();}
  else{calM+=dir; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;}} renderCalendar();}
function renderCalendar(){
  const cal=document.getElementById('cal'); if(!cal)return;
  document.getElementById('calTitle').textContent=calY+' 年 '+(calM+1)+' 月';
  const first=new Date(calY,calM,1), start=first.getDay(), days=new Date(calY,calM+1,0).getDate();
  const dows=['日','一','二','三','四','五','六'];
  let html=dows.map(d=>`<div class="dow">${d}</div>`).join('');
  const byDay={}; TASKS.forEach(t=>{if(t.deadline){(byDay[t.deadline]=byDay[t.deadline]||[]).push(t);}});
  for(let i=0;i<start;i++) html+=`<div class="cell out"></div>`;
  for(let d=1;d<=days;d++){
    const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const list=byDay[ds]||[];
    const chips=list.slice(0,4).map(t=>{const lbl=esc(t.title)+(t.assignee_name?' · '+esc(t.assignee_name):'');
        return `<div class="chip" style="background:${SC[t.status]||'#888'}" onclick="openTask(${t.id})" title="${lbl}">${lbl}</div>`;}).join('')
      +(list.length>4?`<div class="grp">+${list.length-4}</div>`:'');
    html+=`<div class="cell ${ds===todayStr()?'today':''}"><div class="d">${d}</div>${chips}</div>`;
  }
  cal.innerHTML=html;
}

// ---- export ----
function exportCSV(){
  const rows=[['ID','标题','状态','优先级','负责人','截止','群','详情','注意','反馈']];
  const sn={pending:'待接受',accepted:'进行中',done:'已完成',issue:'待沟通'};
  filtered().forEach(t=>rows.push([t.id,t.title||'',sn[t.status]||t.status,t.priority||'',t.assignee_name||'',
    t.deadline||'',GMAP[t.group_chat_id]?.name||'',t.detail||'',t.note||'',t.result||'']));
  const csv='﻿'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='任务导出.csv'; a.click();
}

const saved=sessionStorage.getItem('pw'); if(saved){PW=saved; enterApp();}
