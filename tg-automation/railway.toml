[build]
builder = "RAILPACK"

[deploy]
preDeployCommand = "PYTHONPATH=src python -m alembic upgrade head"
startCommand = "PYTHONPATH=src python -m uvicorn apps.api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
